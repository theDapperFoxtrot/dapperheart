server {
    listen 80;
    server_name daggerheart.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name daggerheart.yourdomain.com;

    # Certs from Certbot — run:
    # sudo certbot --nginx -d daggerheart.yourdomain.com
    ssl_certificate /etc/letsencrypt/live/daggerheart.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daggerheart.yourdomain.com/privkey.pem;

    root /var/www/daggerheart;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
